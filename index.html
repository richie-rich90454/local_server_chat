<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
		<title>Local Server Chat</title>
		<link rel="apple-touch-icon" href="/apple-touch-icon.png">
		<link rel="icon" type="image/png" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" href="/favicon-16x16.png">
		<link rel="icon" href="/favicon.ico" type="image/x-icon">
		<link rel="icon" href="/android-chrome-192x192.png">
		<link rel="icon" href="/android-chrome-512x512.png">
		<link rel="manifest" href="/site.webmanifest">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="src/style.css">
	</head>
	<body>
		<div id="login">
			<h2>Locally Hosted Chat Application Login</h2>
			<div id="username-wrapper">
				<input type="text" id="username" placeholder="Chat Username" autocomplete="off">
				<input type="button" id="genUsername" value="Generate a Five Character Username">
			</div>
			<input type="text" id="userIp" placeholder="IP not Detected" disabled autocomplete="off">
			<input type="button" id="joinChat" value="Join the chat">
			<div id="login-error"></div>
		</div>
		<div id="chatUI" style="display: none;">
			<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
				<h2 style="margin: 0;">Locally Hosted Chat Application Interface <span id="onlineCount" style="font-size:0.8rem;">(0 online)</span></h2>
				<input type="button" id="exportChat" value="Export Chat" style="width: auto; padding: 0.3rem 0.8rem; margin: 0;">
			</div>
			<ul id="messages"></ul>
			<div>
				<textarea id="userMessage" placeholder="Enter something here 😀 (e.g. How is everybody's day?)&NewLine;Send the message with shift+enter or the &quot;Send Message&quot; button below" rows="5" cols="80"></textarea>
				<input type="button" id="sendMessage" value="Send Message">
			</div>
		</div>
		<button id="scrollToBottomBtn" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 100; background: #000; color: #FFF; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer;">↓</button>
		<script type="module" src="src/script.js"></script>
	</body>
</html>
