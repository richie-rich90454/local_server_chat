<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
		<title>Local Server Chat</title>
		<link rel="apple-touch-icon" href="/apple-touch-icon.png">
		<link rel="icon" type="image/png" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" href="/favicon-16x16.png">
		<link rel="icon" href="/favicon.ico" type="image/x-icon">
		<link rel="icon" href="/android-chrome-192x192.png">
		<link rel="icon" href="/android-chrome-512x512.png">
		<link rel="manifest" href="/site.webmanifest">
		<link rel="stylesheet" href="src/font-preload.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<link id="hljs-theme" rel="stylesheet" href="">
		<link rel="stylesheet" href="src/style.css">
	</head>
	<body>
		<div id="login">
			<h2 id="loginHeading">Locally Hosted Chat Application Login</h2>
			<div id="username-wrapper">
				<input type="text" id="username" placeholder="Chat Username" autocomplete="off" aria-label="Username">
				<input type="button" id="genUsername" value="Generate a Five Character Username" aria-label="Generate random username">
			</div>
			<input type="text" id="userIp" placeholder="IP not Detected" disabled autocomplete="off" aria-label="Local IP Address">
			<input type="button" id="joinChat" value="Join the chat" aria-label="Join chat">
			<div id="login-error" role="alert" aria-live="polite"></div>
		</div>
		<div id="chatUI" style="display: none;">
			<div id="chatHeader">
				<h2 id="chatHeading">Locally Hosted Chat Application Interface <span id="onlineCount">(0 online)</span></h2>
				<div id="headerControls">
					<button id="themeToggle" aria-label="Toggle dark/light theme">
						<svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
						<svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
					</button>
					<select id="exportFormat" aria-label="Export format">
						<option value="text">TXT</option>
						<option value="json">JSON</option>
						<option value="html">HTML</option>
					</select>
					<input type="button" id="exportChat" value="Export Chat" aria-label="Export chat log">
					<input type="button" id="clearChat" value="Clear Chat" aria-label="Clear messages from screen">
				</div>
			</div>
			<div id="typingIndicator" role="status" aria-live="polite"></div>
			<ul id="messages" role="log" aria-live="polite"></ul>
			<div id="inputArea">
				<textarea id="userMessage" placeholder="Enter something here 😀 (e.g. How is everybody&quot;s day?)&NewLine;Send the message with shift+enter or the &quot;Send Message&quot; button below" rows="5" cols="80" aria-label="Message input"></textarea>
				<div id="voiceStatus" style="display:none;" role="status" aria-live="assertive">Recording...</div>
				<div id="inputActions">
					<div id="emojiPickerContainer">
						<button id="emojiBtn" title="Insert emoji" aria-label="Open emoji picker">
							<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
								<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
								<path d="M8 14 C8 14 10 16 12 16 C14 16 16 14 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
								<circle cx="9" cy="9" r="1.5" fill="currentColor"/>
								<circle cx="15" cy="9" r="1.5" fill="currentColor"/>
							</svg>
						</button>
						<div id="emojiPicker" style="display:none;" role="menu" aria-label="Emoji picker">
							<span>😀</span> <span>😂</span> <span>😍</span> <span>😢</span> <span>😡</span>
							<span>👍</span> <span>❤️</span> <span>🎉</span> <span>🔥</span> <span>✨</span>
						</div>
					</div>
					<button id="codeBlockBtn" title="Insert code block" aria-label="Insert code block">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path d="M14 6L10 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
							<path d="M8 9L4 12L8 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
							<path d="M16 15L20 12L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</button>
					<button id="voiceBtn" title="Record voice message" aria-label="Record voice message">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path d="M12 2C10.9 2 10 2.9 10 4V12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12V4C14 2.9 13.1 2 12 2Z" fill="currentColor"/>
							<path d="M18 12C18 15.3 15.3 18 12 18C8.7 18 6 15.3 6 12H4C4 16.1 7 19.5 11 19.9V22H13V19.9C17 19.5 20 16.1 20 12H18Z" fill="currentColor"/>
						</svg>
					</button>
					<input type="button" id="sendMessage" value="Send Message" aria-label="Send message">
				</div>
			</div>
			<button id="scrollToBottomBtn" aria-label="Scroll to bottom">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
			</button>
			<div id="chatError" class="chat-error" role="alert" aria-live="assertive"></div>
		</div>
		<script type="module" src="src/script.js"></script>
	</body>
</html>
